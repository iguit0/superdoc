# Tool quality tests — measures how well LLMs understand our tool definitions.
#
# Constraint: single turn, tool_choice: required.
#
# Tests are grouped by ASSERTION CONFIDENCE, not by document operation:
#   Group 1: DEFINITIVE — one correct answer, strict tool + args validation
#   Group 2: FIRST-INSTINCT — which tool does the model reach for?
#            Scored: 1.0 = ideal tool, 0.7 = reads first, 0.0 = wrong category
#   Group 3: ARGUMENT QUALITY — validates args regardless of which tool

# =============================================================================
# GROUP 1: DEFINITIVE — single-step tasks with ONE correct answer
# These are the strongest tests. The first call IS the complete action.
# =============================================================================

- description: 'Get full document text'
  metadata: { category: definitive, group: 1 }
  vars:
    task: 'Get the full plain text of this document.'
  assert:
    - type: tool-call-f1
      value: [superdoc_get_content]
      threshold: 1.0
      metric: tool_selection
    - type: javascript
      value: file://lib/checks.cjs:usesGetContentText
      metric: argument_accuracy

- description: 'Get document as markdown'
  metadata: { category: definitive, group: 1 }
  vars:
    task: 'Export this document as markdown.'
  assert:
    - type: tool-call-f1
      value: [superdoc_get_content]
      threshold: 0.5
      metric: tool_selection

- description: 'Add heading at end'
  metadata: { category: definitive, group: 1 }
  vars:
    task: 'Add a new heading "Chapter 2" at the end of the document.'
    expectedCreateAction: heading
  assert:
    - type: tool-call-f1
      value: [superdoc_create]
      threshold: 0.5
      metric: tool_selection
    - type: javascript
      value: file://lib/checks.cjs:usesCreateAction
      metric: argument_accuracy
    - type: javascript
      value: file://lib/checks.cjs:noTextInsertForStructure
      metric: correctness

- description: 'Add paragraph at end'
  metadata: { category: definitive, group: 1 }
  vars:
    task: 'Add a new paragraph at the end of the document.'
    expectedCreateAction: paragraph
  assert:
    - type: tool-call-f1
      value: [superdoc_create]
      threshold: 0.5
      metric: tool_selection
    - type: javascript
      value: file://lib/checks.cjs:usesCreateAction
      metric: argument_accuracy

- description: 'Undo last change'
  metadata: { category: definitive, group: 1 }
  vars:
    task: 'Undo the last change.'
  assert:
    - type: tool-call-f1
      value: [superdoc_edit]
      threshold: 1.0
      metric: tool_selection
    - type: javascript
      value: file://lib/checks.cjs:usesEditUndo
      metric: argument_accuracy

- description: 'Text search with pattern'
  metadata: { category: definitive, group: 1 }
  vars:
    task: 'Find all paragraphs containing the word "Introduction" in the document.'
  assert:
    - type: tool-call-f1
      value: [superdoc_search]
      threshold: 0.5
      metric: tool_selection
    - type: javascript
      value: file://lib/checks.cjs:textSearchArgs
      metric: argument_accuracy

- description: 'Node search for headings'
  metadata: { category: definitive, group: 1 }
  vars:
    task: 'Find all headings in the document.'
    expectedNodeType: heading
  assert:
    - type: tool-call-f1
      value: [superdoc_search]
      threshold: 0.5
      metric: tool_selection
    - type: javascript
      value: file://lib/checks.cjs:nodeSearchArgs
      metric: argument_accuracy

- description: 'Count text occurrences'
  metadata: { category: definitive, group: 1 }
  vars:
    task: 'How many times does "Acme Corp" appear in this document?'
  assert:
    - type: tool-call-f1
      value: [superdoc_search]
      threshold: 0.5
      metric: tool_selection
    - type: javascript
      value: file://lib/checks.cjs:textSearchArgs
      metric: argument_accuracy

# =============================================================================
# GROUP 2: FIRST-INSTINCT — multi-step tasks, scored by tool choice quality
# 1.0 = ideal tool (model knows the right tool), 0.7 = reads first, 0.0 = wrong
# The prompt comparison (full vs minimal) reveals tool description quality.
# =============================================================================

# --- Edit tasks ---

- description: 'Replace text (instinct)'
  metadata: { category: instinct, group: 2 }
  vars:
    task: 'Replace the text "old title" with "new title" in the document.'
  assert:
    - type: javascript
      value: file://lib/checks.cjs:instinctEdit
      metric: tool_instinct

- description: 'Delete sentence (instinct)'
  metadata: { category: instinct, group: 2 }
  vars:
    task: 'Remove the sentence "This is a draft document." from the introduction.'
  assert:
    - type: javascript
      value: file://lib/checks.cjs:instinctEdit
      metric: tool_instinct

- description: 'Atomic multi-step replace (instinct)'
  metadata: { category: instinct, group: 2 }
  vars:
    task: 'Replace "Q1" with "Quarter 1" and "Q2" with "Quarter 2" atomically.'
  assert:
    - type: javascript
      value: file://lib/checks.cjs:instinctEdit
      metric: tool_instinct

- description: 'First-occurrence replace (instinct)'
  metadata: { category: instinct, group: 2 }
  vars:
    task: 'Replace the first occurrence of "draft" with "final" in the document.'
  assert:
    - type: javascript
      value: file://lib/checks.cjs:instinctEdit
      metric: tool_instinct

# --- Format tasks ---

- description: 'Bold text (instinct)'
  metadata: { category: instinct, group: 2 }
