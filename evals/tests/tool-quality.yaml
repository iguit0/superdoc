- description: 'Comment on liability clauses (instinct)'
  metadata: { category: instinct, group: 2, source: spreadsheet }
  vars:
    task: 'Add a review comment to each paragraph containing "limitation of liability".'
  assert:
    - type: javascript
      value: file://lib/checks.cjs:instinctComment
      metric: tool_instinct

# --- List tasks ---

- description: 'Convert bullets to numbered list (instinct)'
  metadata: { category: instinct, group: 2 }
  vars:
    task: 'Convert the bullet points in section 2 into a numbered list.'
  assert:
    - type: javascript
      value: file://lib/checks.cjs:instinctList
      metric: tool_instinct

- description: 'Change list numbering style (instinct)'
  metadata: { category: instinct, group: 2, source: spreadsheet }
  vars:
    task: 'Change the third level of this list to lowercase Roman numerals.'
  assert:
    - type: javascript
      value: file://lib/checks.cjs:instinctList
      metric: tool_instinct

# --- Tracked changes tasks ---

- description: 'Tracked change edit (instinct)'
  metadata: { category: instinct, group: 2 }
  vars:
    task: 'Suggest replacing "annual review" with "quarterly review" using tracked changes.'
  assert:
    - type: javascript
      value: file://lib/checks.cjs:instinctTrackChanges
      metric: tool_instinct

- description: 'Direct edit (instinct)'
  metadata: { category: instinct, group: 2 }
  vars:
    task: 'Replace "draft" with "final version" in the title. Apply directly.'
  assert:
    - type: javascript
      value: file://lib/checks.cjs:instinctEdit
      metric: tool_instinct

# =============================================================================
# GROUP 3: ARGUMENT QUALITY — validates args regardless of which tool
# =============================================================================

- description: 'No hallucinated doc or sessionId params'
  metadata: { category: quality, group: 3 }
  vars:
    task: 'Extract all the plain text so I can paste it elsewhere.'
  assert:
    - type: javascript
      value: file://lib/checks.cjs:noHallucinatedParams
      metric: argument_accuracy

- description: 'Rewrite + format must not be mixed in one batch'
  metadata: { category: quality, group: 3 }
  vars:
    task: 'Replace "old text" with "new text" and make it bold.'
  assert:
    - type: javascript
      value: file://lib/checks.cjs:noMixedBatch
      metric: correctness

- description: 'Simple replace uses 5 or fewer tool calls'
  metadata: { category: quality, group: 3 }
  vars:
    task: 'Replace the word "hello" with "goodbye" in the document.'
  assert:
    - type: javascript
      metric: efficiency
      value: 'output.length <= 5'
