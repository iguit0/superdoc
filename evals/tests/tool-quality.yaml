      value: file://lib/checks.cjs:instinctFormat
      metric: tool_instinct

- description: 'Highlight text (instinct)'
  metadata: { category: instinct, group: 2, source: spreadsheet }
  vars:
    task: 'Apply yellow highlight to every occurrence of "high risk" in the document.'
  assert:
    - type: javascript
      value: file://lib/checks.cjs:instinctFormat
      metric: tool_instinct

- description: 'Underline text (instinct)'
  metadata: { category: instinct, group: 2, source: spreadsheet }
  vars:
    task: 'Underline the sentence containing "payment terms" in the document.'
  assert:
    - type: javascript
      value: file://lib/checks.cjs:instinctFormat
      metric: tool_instinct

# --- Comment tasks ---

- description: 'Add comment (instinct)'
  metadata: { category: instinct, group: 2 }
  vars:
    task: 'Add a comment on the first paragraph saying "Needs legal review".'
  assert:
    - type: javascript
      value: file://lib/checks.cjs:instinctComment
